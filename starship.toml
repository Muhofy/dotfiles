# ╔════════════════════════════════════════════════════════╗
# ║  starship.toml — Muhofy Edition (Minimal Gruvbox)     ║
# ╚════════════════════════════════════════════════════════╝

palette = "gruvbox_dark"

[palettes.gruvbox_dark]
fg     = "#ebdbb2"
gray   = "#928374"
yellow = "#fabd2f"
blue   = "#83a598"
purple = "#d3869b"
green  = "#b8bb26"
red    = "#fb4934"
aqua   = "#8ec07c"

format = """
$username\
$hostname\
$directory\
$git_branch\
$java\
$line_break\
$character"""

[username]
disabled    = false
show_always = true
format      = "[$user]($style)"
style_user  = "fg:yellow bold"
style_root  = "fg:red bold"

[hostname]
disabled  = false
ssh_only  = false
format    = "[@$hostname]($style) "
style     = "fg:gray"
trim_at   = "."

[directory]
format            = "[$path]($style) "
style             = "fg:blue bold"
truncation_length = 4
truncate_to_repo  = false
home_symbol       = "~"
use_logical_path  = true

[git_branch]
format = "[$branch]($style) "
style  = "fg:purple bold"
symbol = ""

[java]
format       = "[$symbol]($style)"
symbol       = "☕ "
style        = "fg:yellow"
detect_files = ["pom.xml", "build.gradle", "*.java", ".java-version"]

[git_status]
disabled = true

[git_metrics]
disabled = true

[cmd_duration]
disabled = true

[nodejs]
disabled = true

