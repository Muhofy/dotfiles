# ╔════════════════════════════════════════════════════════╗
# ║  .tmux.conf — Muhofy Edition                          ║
# ║  Prefix: Ctrl+A                                       ║
# ╚════════════════════════════════════════════════════════╝

# ── Prefix ───────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Genel ────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g default-shell /data/data/com.termux/files/usr/bin/zsh

# ── Pencere / Panel ──────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim tarzı panel geçişi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Panel boyutlandırma
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Panel zoom (tam ekran)
bind z resize-pane -Z

# Config yenile
bind r source-file ~/.tmux.conf \; display "✔ Config yenilendi"

# ── Kopyalama ────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "termux-clipboard-set"
bind p run "termux-clipboard-get | tmux load-buffer - && tmux paste-buffer"

# ── Durum Çubuğu (Gruvbox) ───────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 50
set -g status-right-length 80

# Renkler
set -g status-style                 "bg=#282828 fg=#ebdbb2"
set -g pane-border-style            "fg=#504945"
set -g pane-active-border-style     "fg=#fabd2f"
set -g message-style                "fg=#282828 bg=#fabd2f bold"
set -g mode-style                   "fg=#282828 bg=#fabd2f"

# Sol: session adı
set -g status-left "#[fg=#282828,bg=#fabd2f,bold] #S #[fg=#fabd2f,bg=#3c3836]#[fg=#ebdbb2,bg=#3c3836] #{pane_current_path} #[fg=#3c3836,bg=#282828]"

# Sağ: RAM + saat
set -g status-right "#[fg=#3c3836,bg=#282828]#[fg=#ebdbb2,bg=#3c3836] 🧠 #{?#{m:*M*,#{ram_info}},#{ram_info},--}  #[fg=#fabd2f,bg=#3c3836]#[fg=#282828,bg=#fabd2f,bold] %H:%M "

# Pencere listesi
set -g window-status-format         "#[fg=#928374,bg=#282828]  #I:#W  "
set -g window-status-current-format "#[fg=#282828,bg=#b8bb26,bold]  #I:#W  #[fg=#b8bb26,bg=#282828]"

# ── Proje Layout (Ctrl+A → P) ────────────────────────────
bind P run-shell '~/.termux-config/layouts/project.sh'

# ── Hızlı Session Geçişi ─────────────────────────────────
bind s choose-session
bind n new-session \; command-prompt "rename-session '%%'"
bind X confirm-before -p "Sessionu sil? (y/n)" kill-session